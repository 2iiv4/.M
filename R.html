<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hero-blur {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .card-interaction-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .decorative-card {
            position: absolute;
            z-index: 25;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* Increased left shift from -120px to -160px */
            transform: translate(-160px, -80px) rotate(-25deg) scale(0.9);
            cursor: pointer;
        }
        .decorative-card.active {
            /* Maintain consistent left shift */
            transform: translate(-160px, 0) rotate(0deg) scale(1.1);
            z-index: 45;
        }
        .flower-bouquet {
            position: relative;
            z-index: 30;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .decorative-card.active ~ .flower-bouquet {
            opacity: 0.3;
        }
    
        @keyframes drift {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) translateX(100px) rotate(720deg); opacity: 0; }
        }
        .petal {
            position: absolute;
            top: -5vh;
            pointer-events: none;
            animation: drift linear infinite;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden h-screen w-screen relative">

</div>

<!-- Main Composition -->

<div class="card-interaction-container">
<!-- Decorative Card behind bouquet initially - Positioned higher and now shifted left via CSS -->

<div class="relative">

<div class="absolute inset-0 flex items-center justify-center">
<h2 class="font-headline text-primary drop-shadow-sm select-none"

    يمر العام
 وبعده عام 
وما يكبر سِوى

</div>
</div>
<!-- Centerpiece Bouquet - Significantly Larger -->

<img alt="Lavender Rose Bouquet" class="w-[500px] md:w-[850px] max-w-none transform" src="https://lh3.googleusercontent.com/aida/ADBb0uh-nEnM3nqyWrZPCVDi2rhtrgqfcTtViWySAiyHTKU5NQnEFjaM6qq0Mn3DKmt6CamiSjlyjHF1cvJo8jl0OJkhohuTnkXwdg2ODo0fwt6tRalDlwyqQwpNDj0aNZzwG99LjlApwuQ5sMMkTXiwN3DXiDNPtlX9RsRJAzEygKkcJg4XpYpDR72bpiSoAEXpWcchAY2Im4j1NDGmRvXjRwzG0TaIku1nYF9bC_u6g5q49GJBcufbfr9qx2TgNXSyZDIf4NCusJtQsg"/>
</div>
</div>
</main>
<!-- Decorative Gold Accents -->
<div class="fixed top-12 left-12 z-40 border-l border-t border-secondary/30 w-16 h-16 pointer-events-none"></div>
<div class="fixed top-12 right-12 z-40 border-r border-t border-secondary/30 w-16 h-16 pointer-events-none"></div>
<div class="fixed bottom-32 left-12 z-40 border-l border-b border-secondary/30 w-16 h-16 pointer-events-none"></div>
<div class="fixed bottom-32 right-12 z-40 border-r border-b border-secondary/30 w-16 h-16 pointer-events-none"></div>
<script>
    const container = document.getElementById('petal-container');
    const petalCount = 60;

    for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        const size = Math.random() * 12 + 6;
        const duration = Math.random() * 10 + 10;
        const delay = Math.random() * 20;
        
        petal.className = 'petal';
        petal.style.width = `${size}px`;
        petal.style.height = `${size}px`;
        petal.style.backgroundColor = '#d5bffe';
        petal.style.borderRadius = '50% 0 50% 50%';
        petal.style.left = `${Math.random() * 100}vw`;
        petal.style.animationDuration = `${duration}s`;
        petal.style.animationDelay = `-${delay}s`;
        petal.style.opacity = Math.random() * 0.5 + 0.3;
        
        container.appendChild(petal);
    }
    </script>
</body></html>
